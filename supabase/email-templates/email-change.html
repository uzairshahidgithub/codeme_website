<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm your new Codemo email</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:Helvetica,Arial,sans-serif;color:#f5f5f5;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0a0a0a;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="max-width:560px;background:#141414;border:1px solid #2a2a2a;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 32px 16px 32px;">
              <p style="margin:0 0 8px 0;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#2D7FF9;">Codemo Teams</p>
              <h1 style="margin:0;font-size:24px;font-weight:600;color:#ffffff;line-height:1.3;">Confirm your new email</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 24px 32px;">
              <p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;color:#d9d9d9;">
                Confirm <strong style="color:#ffffff;">{{ .NewEmail }}</strong> as the new email address for your Codemo account.
              </p>
              <p style="margin:0 0 24px 0;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;background:#2D7FF9;color:#ffffff;border-radius:999px;text-decoration:none;font-weight:600;font-size:15px;">
                  Confirm new email
                </a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px 32px;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#9e9e9e;">
                If you did not request this change, contact support immediately.
              </p>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0 0;font-size:12px;color:#6e6e6e;">
          Codemo Teams &middot; codemoteam.org
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
