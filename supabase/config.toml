# Supabase local development configuration
# Reference: https://supabase.com/docs/reference/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "2MiB"

[auth]
enabled = true
# Site URL — override per environment via environment variable SITE_URL
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/update-password",
  "https://codemoteam.org/auth/callback",
  "https://codemoteam.org/auth/update-password"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
# TEMPORARY: email confirmation and email-change verification disabled until
# the self-hosted Postal SMTP relay is provisioned (see smtp/setup-guide.md)
# and credentials are pasted into Supabase Auth → SMTP. Flip both back to
# `true` once `noreply@codemoteam.org` is sending via Postal.
# See docs/SUPABASE.md → "Auth → SMTP (custom)".
double_confirm_changes = false
enable_confirmations = false
secure_password_change = true
max_frequency = "5m"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_CLIENT_SECRET)"
redirect_uri = ""
url = ""

[auth.external.azure]
enabled = true
client_id = "env(SUPABASE_AUTH_AZURE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_AZURE_CLIENT_SECRET)"
url = ""

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"

[functions]
verify_jwt = true
