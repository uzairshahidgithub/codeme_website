    button { cursor: pointer; border: none; background: transparent; }

  mode: dark ? 'dark' : 'light',
  /* surfaces */
  bg:          dark ? '#080808'                        : '#e8e8ee',
  navGlass:    dark ? 'rgba(18,18,22,0.78)'           : 'rgba(255,255,255,0.72)',
  sideGlass:   dark ? 'rgba(16,16,20,0.82)'           : 'rgba(255,255,255,0.78)',
  cardGlass:   dark ? 'rgba(22,22,28,0.88)'           : 'rgba(255,255,255,0.86)',
  inputGlass:  dark ? 'rgba(30,30,38,0.90)'           : 'rgba(240,240,248,0.90)',
  chipGlass:   dark ? 'rgba(28,28,36,0.80)'           : 'rgba(230,230,240,0.80)',
  /* borders — inner highlight + subtle ring */
  border:      dark ? 'rgba(255,255,255,0.09)'        : 'rgba(0,0,0,0.10)',
  innerHi:     dark ? 'rgba(255,255,255,0.12)'        : 'rgba(255,255,255,0.90)',
  ring:        dark ? 'rgba(255,255,255,0.04)'        : 'rgba(0,0,0,0.04)',
  /* text */
  text1:       dark ? '#f0f0f0'  : '#0a0a0a',
  text2:       dark ? '#787878'  : '#5a5a5a',
  text3:       dark ? '#404040'  : '#a0a0a0',
  /* icon */
  iconIdle:    dark ? '#585858'  : '#8a8a8a',
  /* accents */
  blue:        '#2355E8',
  blueGlow:    dark ? 'rgba(35,85,232,0.22)' : 'rgba(35,85,232,0.12)',
  /* misc */
  shadow:      dark ? '0 24px 64px rgba(0,0,0,0.75)' : '0 12px 48px rgba(0,0,0,0.12)',
  navShadow:   dark ? '0 4px 32px rgba(0,0,0,0.6)'   : '0 4px 24px rgba(0,0,0,0.10)',
  blur:        'blur(28px) saturate(200%)',
  rippleColor: dark ? '#1a1a2e' : '#e8eeff',
});

const ThemeCtx = createContext(mkTheme(true));
const useT = () => useContext(ThemeCtx);

/* glass box-shadow helper */
const glassShadow = (T, extra = '') =>
  `inset 0 1px 0 ${T.innerHi}, 0 0 0 1px ${T.border}, 0 0 0 3px ${T.ring}${extra ? ', ' + extra : ''}`;

/* ══════════════════════════════════════════════
   GLASS SURFACE primitive
══════════════════════════════════════════════ */
function GlassSurface({ children, style: s = {}, radius = 22 }) {
  const T = useT();
  return (
    <div style={{
      background: T.cardGlass,
      backdropFilter: T.blur,
      WebkitBackdropFilter: T.blur,
      borderRadius: radius,
      border: `1px solid ${T.border}`,
      boxShadow: glassShadow(T, T.shadow),
      ...s,
    }}>{children}</div>
  );
}

/* ══════════════════════════════════════════════
   PRIMITIVES
══════════════════════════════════════════════ */
function Btn({ children, onClick, variant = 'primary', full, style: s = {} }) {
  const T = useT();
  const isPrimary = variant === 'primary';
  return (
    <button onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      borderRadius: 30, padding: '14px 28px', fontSize: 16, fontWeight: 500,
      cursor: 'pointer', transition: 'filter .15s',
      width: full ? '100%' : undefined, letterSpacing: '.01em',
      background: isPrimary ? '#2355E8' : T.chipGlass,
      color: isPrimary ? '#fff' : T.text2,
      border: isPrimary ? 'none' : `1px solid ${T.border}`,
      backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
      boxShadow: isPrimary
        ? 'inset 0 1px 0 rgba(255,255,255,.18), 0 4px 20px rgba(35,85,232,.35)'
        : glassShadow(T),
      ...s,
    }}
      onMouseEnter={e => e.currentTarget.style.filter = 'brightness(1.12)'}
      onMouseLeave={e => e.currentTarget.style.filter = 'brightness(1)'}
    >{children}</button>
  );
}

function Field({ placeholder, value, onChange, type = 'text', rightEl, readOnly }) {
  const T = useT();
  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <input type={type} placeholder={placeholder} value={value}
        onChange={onChange} readOnly={readOnly}
        style={{
          width: '100%', background: T.inputGlass,
          backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
          border: `1px solid ${T.border}`, borderRadius: 14,
          boxShadow: glassShadow(T),
          color: T.text1, padding: rightEl ? '16px 52px 16px 20px' : '16px 20px',
          fontSize: 16, transition: 'border-color .15s, box-shadow .15s',
        }}
        onFocus={e => { e.target.style.borderColor = 'rgba(35,85,232,.5)'; e.target.style.boxShadow = `inset 0 1px 0 ${T.innerHi}, 0 0 0 1px rgba(35,85,232,.4), 0 0 0 4px rgba(35,85,232,.12)`; }}
        onBlur={e => { e.target.style.borderColor = T.border; e.target.style.boxShadow = glassShadow(T); }}
      />
      {rightEl && (
        <div style={{ position: 'absolute', right: 18, top: '50%', transform: 'translateY(-50%)' }}>
          {rightEl}
        </div>
      )}
    </div>
  );
}

function LogoLockup({ style: s = {} }) {

  return (

      <Logo />

}

function SocialRow() {
  const T = useT();
  return (
    <div style={{ display: 'flex', justifyContent: 'center', gap: 14 }}>

          border: `1px solid ${T.border}`, boxShadow: glassShadow(T),
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: T.text1, transition: 'box-shadow .15s',
        }}
          onMouseEnter={e => e.currentTarget.style.boxShadow = glassShadow(T, `0 4px 16px ${T.blueGlow}`)}
          onMouseLeave={e => e.currentTarget.style.boxShadow = glassShadow(T)}
        >{item.icon}</button>
      ))}
    </div>
  );
}

function Divider({ label }) {
  const T = useT();

      <div style={{ flex: 1, height: 1, background: T.border }} />
    </div>
  );
}

      if (ref.current && !ref.current.contains(e.target)) {
        setProfileOpen(false); setSignupOpen(false);
        if (searchOpen) setSearchOpen(false);
      }
    };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, [searchOpen]);

  /* glass circle search btn */
  const SearchBtn = () => {
    const [hov, setHov] = useState(false);
    return (
      <button
        onClick={() => setSearchOpen(true)}
        onMouseEnter={() => setHov(true)}
        onMouseLeave={() => setHov(false)}
        style={{
          width: 38, height: 38, borderRadius: '50%',
          background: hov
            ? (T.mode === 'dark' ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.08)')

          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background .15s',
        }}
      >
        <Ico d={P.search} fill={T.text2} size={18} />
      </button>
    );
  };

  /* glass auth pill */
  const AuthPill = () => {
    const [hov, setHov] = useState(false);
    return (
      <button

        <span>{isLoggedIn ? 'Muhammad' : 'Sign Up'}</span>
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: T.mode === 'dark' ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.07)',
          border: `1.5px solid ${T.mode === 'dark' ? 'rgba(255,255,255,.18)' : 'rgba(0,0,0,.14)'}`,
          boxShadow: `0 0 0 2.5px ${T.ring}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Ico d={P.user} fill={T.text2} size={17} />
        </div>
      </button>
    );
  };

  return (
    <div ref={ref} style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 300,
      background: T.navGlass,
      backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
      height: 64,
      display: 'flex', alignItems: 'center', padding: '0 20px', gap: 12,
      borderBottom: `1px solid ${T.border}`,
      borderRadius: '0 0 22px 22px',
      boxShadow: `inset 0 1px 0 ${T.innerHi}, ${T.navShadow}`,
    }}>
      <div onClick={() => setView('auth')} style={{ cursor: 'pointer' }}>
        <LogoLockup />
      </div>
      <div style={{ flex: 1 }} />

      {/* Nav links */}
      <nav style={{ display: 'flex', gap: 28, marginRight: 6 }}>
        {['Join Us', 'Donate', 'Contact'].map(l => (
          <span key={l} style={{ color: T.text2, fontSize: 15, cursor: 'pointer', fontWeight: 400, transition: 'color .15s', letterSpacing: '.01em' }}
            onMouseEnter={e => e.target.style.color = T.text1}
            onMouseLeave={e => e.target.style.color = T.text2}
          >{l}</span>
        ))}
      </nav>

      {/* Search */}
      <div style={{ position: 'relative' }}>
        {searchOpen ? (
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10,
            background: T.inputGlass, backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
            border: `1px solid ${T.border}`, borderRadius: 22, padding: '9px 16px',
            boxShadow: glassShadow(T),
          }}>

              style={{ background: 'transparent', border: 'none', color: T.text1, fontSize: 15, width: 190, fontFamily: 'Poppins,sans-serif' }}

      {/* Auth */}

        {/* Sign up dropdown */}

          <GlassSurface style={{ position: 'absolute', right: 0, top: 50, width: 310, padding: 26 }}>
            <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>

              <div style={{ width: 58, height: 58, borderRadius: '50%', background: T.inputGlass, border: '2.5px solid #2355E8', boxShadow: `0 0 0 4px ${T.blueGlow}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Ico d={P.user} fill={T.text2} size={26} />
              </div>
              <div>
                <p style={{ color: T.text1, fontWeight: 600, fontSize: 16 }}>Muhammad Uzair</p>
                <p style={{ color: T.text2, fontSize: 13, marginTop: 3 }}>Cybersecurity Engineer</p>
                <span style={{ display: 'inline-block', marginTop: 7, background: T.chipGlass, color: T.text2, fontSize: 11, padding: '3px 12px', borderRadius: 14, fontWeight: 500, border: `1px solid ${T.border}` }}>Community Member</span>
              </div>
            </div>
            {[{ d: P.shield, label: 'Achievements', sub: 'Level 2' }, { d: P.gear, label: 'Edit Profile', sub: '' }].map(({ d, label, sub }) => (

                onMouseLeave={e => e.currentTarget.style.color = T.text2}
              >
                <Ico d={d} fill={T.text3} size={20} />
                <span>{label}</span>
                {sub && <span style={{ color: T.text3, fontSize: 12, marginLeft: 4 }}>{sub}</span>}
              </button>
            ))}
          </GlassSurface>
        )}
      </div>
    </div>
  );
}

function Sidebar({ expanded, setExpanded, active, setActive, darkMode, setDarkMode, onThemeToggle }) {
  const T = useT();
  const w = expanded ? 200 : 70;
  return (
    <div style={{ position: 'fixed', top: 80, left: 14, bottom: 14, display: 'flex', flexDirection: 'column', zIndex: 200 }}>
      <div style={{
        background: T.sideGlass,
        backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
        borderRadius: 22, width: w,
        transition: 'width .26s cubic-bezier(.4,0,.2,1)', overflow: 'hidden',
        display: 'flex', flexDirection: 'column', flex: 1,
        border: `1px solid ${T.border}`,
        boxShadow: glassShadow(T, T.shadow),
      }}>
        {/* Nav items */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 2, padding: '14px 10px' }}>
          {NAV_ITEMS.map(({ key, d, label }) => {
            const isActive = active === key;
            return (
              <button key={key} onClick={() => setActive(key)} style={{
                display: 'flex', alignItems: 'center',
                gap: expanded ? 16 : 0,
                padding: '13px 12px', borderRadius: 14,
                justifyContent: expanded ? 'flex-start' : 'center',
                width: '100%', background: 'transparent', transition: 'opacity .15s',
              }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.opacity = '.7'; }}
                onMouseLeave={e => e.currentTarget.style.opacity = '1'}
              >
                {/* Active: blue icon; idle: gray icon — NO background */}
                <Ico d={d} fill={isActive ? '#2355E8' : T.iconIdle} size={26} />
                {expanded && (
                  <span style={{ color: isActive ? '#2355E8' : T.text2, fontSize: 16, fontWeight: isActive ? 600 : 400, whiteSpace: 'nowrap' }}>
                    {label}
                  </span>
                )}
              </button>
            );
          })}
        </div>

        {/* Bottom controls */}
        <div style={{ borderTop: `1px solid ${T.border}`, margin: '0 10px', paddingTop: 12, paddingBottom: 12 }}>
          {/* Light / Dark toggle */}
          <button onClick={onThemeToggle} style={{
            display: 'flex', alignItems: 'center',
            gap: expanded ? 16 : 0,
            padding: '12px 12px', borderRadius: 14,
            justifyContent: expanded ? 'flex-start' : 'center',
            width: '100%', background: 'transparent', transition: 'opacity .15s',
          }}
            onMouseEnter={e => e.currentTarget.style.opacity = '.7'}
            onMouseLeave={e => e.currentTarget.style.opacity = '1'}
          >
            <Ico d={darkMode ? P.sun : P.moon} fill={T.iconIdle} size={26} />
            {expanded && <span style={{ color: T.text2, fontSize: 16, whiteSpace: 'nowrap' }}>{darkMode ? 'Light Mode' : 'Dark Mode'}</span>}
          </button>

          {/* Single expand / collapse */}
          <div style={{ marginTop: 8, display: 'flex', justifyContent: 'center' }}>
            <button onClick={() => setExpanded(v => !v)} style={{
              width: 46, height: 46, borderRadius: 14,
              background: T.chipGlass, backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
              border: `1px solid ${T.border}`, boxShadow: glassShadow(T),
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'opacity .15s',
            }}
              onMouseEnter={e => e.currentTarget.style.opacity = '.7'}
              onMouseLeave={e => e.currentTarget.style.opacity = '1'}
            >
              <Ico d={expanded ? P.close : P.menu} fill={T.iconIdle} size={22} />
            </button>
          </div>
        </div>
      </div>

      {/* Logout orb */}
      <div style={{ marginTop: 12, display: 'flex', justifyContent: 'center' }}>
        <button style={{
          width: 50, height: 50, borderRadius: '50%',
          background: T.sideGlass, backdropFilter: T.blur, WebkitBackdropFilter: T.blur,

        }}

        >
          <Ico d={P.logout} fill={T.iconIdle} size={22} />
        </button>
      </div>
    </div>
  );
}

  const [view, setView]       = useState('auth');
  const [darkMode, setDarkMode] = useState(true);
  const [ripple, setRipple]   = useState(null);
  const theme = mkTheme(darkMode);

  const onThemeToggle = useCallback(() => {
    /* spawn ripple from sidebar area */
    const x = 35, y = window.innerHeight - 120;
    setRipple({ id: Date.now(), x, y, color: darkMode ? LIGHT_RIPPLE : DARK_RIPPLE });
    setTimeout(() => { setDarkMode(v => !v); setRipple(null); }, 310);
  }, [darkMode]);

  const DARK_RIPPLE = '#0a0a1a';
  const LIGHT_RIPPLE = '#eaeaf8';

  const shell = (loggedIn) => (
    <HomeShell isLoggedIn={loggedIn} setView={setView}
      darkMode={darkMode} setDarkMode={setDarkMode}
      onThemeToggle={onThemeToggle}
    />
  );

  const screens = {
    'auth':          <AuthPage    setView={setView} />,
    'login':         <LoginPage   setView={setView} />,
    'signup-1':      <SignUp1     setView={setView} />,
    'signup-2':      <SignUp2     setView={setView} />,
    'signup-3':      <SignUp3     setView={setView} />,
    'signup-4':      <SignUp4     setView={setView} />,
    'success':       <SuccessPage setView={setView} />,
    'home':          shell(false),
    'home-loggedin': shell(true),
  };

  return (
    <ThemeCtx.Provider value={theme}>
      <div style={{ position: 'relative', minHeight: '100vh' }}>
        {screens[view] ?? screens['auth']}
        {/* Mode ripple overlay */}
        {ripple && (
          <div key={ripple.id} className="mode-ripple" style={{
            left: ripple.x, top: ripple.y,
            background: darkMode ? '#d8d8f0' : '#0a0a18',
          }} />
        )}
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
